[build]
  command = "pnpm --filter @workspace/lineup run build"
  publish = "artifacts/lineup/dist/public"

[build.environment]
  BASE_PATH = "/"
  NODE_VERSION = "24"
  NODE_OPTIONS = "--max-old-space-size=4096"

# Proxy /api/* to your deployed API server.
# Set VITE_API_BASE_URL in Netlify → Site settings → Environment variables
# to the full URL of your API server (e.g. https://your-api.onrender.com).
[[redirects]]
  from = "/api/*"
  to = "https://placeholder-replace-with-your-api-server.com/api/:splat"
  status = 200
  force = true

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
