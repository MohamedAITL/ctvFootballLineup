[build]
  command = "pnpm --filter @workspace/lineup run build"
  publish = "artifacts/lineup/dist/public"

[build.environment]
  BASE_PATH = "/"
  NODE_VERSION = "24"
  NODE_OPTIONS = "--max-old-space-size=4096"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
